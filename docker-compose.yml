services:
  app:
    build: .
    container_name: go_speedtest_app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=speedtest_db
    ports:
      - "8080:8080"  # Expose the Go app on port 8080
    depends_on:
      - db

  db:
    image: postgres:13
    container_name: speedtest_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: speedtest_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"  # Expose the database on port 5432 (optional for local access)

volumes:
  db_data:
